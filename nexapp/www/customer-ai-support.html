<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/nexapp/css/customer-ai-support.css">
    <script>
        window.csrf_token = "{{ frappe.session.csrf_token }}";
    </script>
</head>

<body>
    <div class="app-wrapper">
        <div class="chat-container">
            <header class="chat-header">
                <div class="header-content">
                    <span class="bot-icon">🤖</span>
                    <div class="header-text">
                        <h1>Customer Support Intelligence</h1>
                        <p class="status-indicator">Online | Powered by Nexapp AI</p>
                    </div>
                </div>
                <button class="clear-btn" onclick="clearChat()" title="Clear Chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18"></path>
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                    </svg>
                </button>
            </header>

            <main id="chat-box" class="chat-box"></main>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <div class="input-field-row">
                        <input id="user-input" autocomplete="off" placeholder="Ask about Circuit ID, Installations..."
                            onkeypress="handleKeyPress(event)" />
                        <button id="send-btn" onclick="sendMessage()" title="Send Message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <div class="quick-actions-row">
                        <button class="quick-action-btn" onclick="setPrompt('Generate installation report for ')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                            Installation Report
                        </button>
                    </div>
                </div>
            </footer>
        </div>

        <!-- Stable Full Preview Lightbox -->
        <div id="full-preview-container" class="full-preview-overlay">
            <div id="preview-window" class="preview-window">
                <button class="preview-close-btn" onclick="closePreview()" title="Close Preview">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
                <div class="preview-body">
                    <img id="preview-img-large" src="" alt="Full View">
                    <iframe id="preview-pdf-large" src=""
                        style="display:none; width:100%; height:100%; border:none;"></iframe>
                </div>
                <div id="preview-footer" class="preview-footer">
                    <div class="preview-info">
                        <span id="preview-label"></span>
                    </div>
                    <a id="preview-download" href="#" download class="preview-download-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" style="margin-right:8px">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Download Full Image
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/nexapp/js/customer-ai-support.js"></script>
</body>

</html>
