<div class="ai-wrapper">

    <div class="ai-box">

        <div class="ai-title">
            <h1>AI Command Center</h1>
            <p id="ai-greeting"></p>
        </div>

        <div class="ai-input">
            <input type="text" id="ai-input" placeholder="Ask anything..." />
            <button id="ai-send">→</button>
        </div>

        <div class="ai-actions">
            <div class="ai-action" data-action="feasibility">
                <span>📊</span>
                <p>Feasibility</p>
            </div>

            <div class="ai-action" data-action="lead">
                <span>📈</span>
                <p>Lead</p>
            </div>
        </div>

    </div>

    <div id="ai-workspace" class="ai-workspace"></div>

</div>
